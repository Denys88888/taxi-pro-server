services:
  - type: web
    name: taxi-pro-server
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: PI_API_KEY
        sync: false
      - key: PI_SANDBOX
        value: true
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://denys88888.github.io
      - key: RENDER_URL
        sync: false
      # SQLite DB path. For cross-deploy persistence, attach a Render disk mounted
      # at /app/data (see the `disk` block below — requires a paid plan).
      - key: SQLITE_PATH
        value: /app/data/taxipro.db
    # disk:
    #   name: taxipro-data
    #   mountPath: /app/data
    #   sizeGB: 1
