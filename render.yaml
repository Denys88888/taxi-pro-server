services:
  - type: web
    name: taxi-pro-server
    runtime: docker
    plan: free
    envVars:
      - key: PI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: RENDER_URL
        sync: false
