# Free uptime monitoring: pings the production API every 10 minutes.
# A failed run emails the repo owner (GitHub's default workflow-failure
# notification) — and the regular traffic keeps the Render free tier awake.
name: Uptime

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          curl -fsS --retry 3 --retry-delay 20 --max-time 90 \
            https://taxi-pro-server.onrender.com/api/health
