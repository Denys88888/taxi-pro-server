name: Keepalive

on:
  schedule:
    # Every 14 minutes — keeps Render free tier from spinning down (15 min idle).
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          curl --silent --fail --max-time 30 --retry 2 \
            "${{ secrets.RENDER_API_URL }}/api/health" \
            | grep -q '"status":"ok"'
        env:
          RENDER_API_URL: ${{ secrets.RENDER_API_URL }}
