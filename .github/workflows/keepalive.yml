name: Keep Render awake

# Render free tier spins the instance down after 15 idle minutes and wipes
# its ephemeral disk (the SQLite DB) on every spin-up. Pinging /api/health
# from outside keeps the instance warm so registered drivers and rides
# survive between deploys.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 60 \
              https://taxi-pro-server.onrender.com/api/health) && \
            echo "attempt $i: HTTP $code" && [ "$code" = "200" ] && exit 0
            sleep 20
          done
          echo "server did not answer 200 after 3 attempts" && exit 1
